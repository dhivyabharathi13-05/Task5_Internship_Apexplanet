<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freelancer Marketplace</title>
<link rel="stylesheet" href="style.css">
</head>=

<body>

<header>
<h1>Freelancer Marketplace</h1>
<input type="text" id="search" placeholder="Search projects...">
</header>

<section class="post-project">
<h2>Post a Project</h2>

<input type="text" id="title" placeholder="Project Title">
<input type="text" id="budget" placeholder="Budget">
<textarea id="description" placeholder="Project Description"></textarea>

<button onclick="addProject()">Post Project</button>
</section>

<section class="projects">
<h2>Available Projects</h2>
<div id="projectList"></div>
</section>

<script src="script.js"></script>
</body>
</html>
